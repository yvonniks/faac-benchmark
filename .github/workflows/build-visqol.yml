name: Build and Push ViSQOL Image

on:
  push:
    branches: [ "master" ]
    paths:
      - 'Dockerfile.visqol'
      - 'requirements_visqol.txt'
      - 'config.py'
      - 'phase2_mos.py'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.visqol
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/nschimme/faac-benchmark-visqol:latest
            ghcr.io/nschimme/faac-benchmark-visqol:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: Build and Push ViSQOL Image

on:
  push:
    branches: [ "master" ]
    paths:
      - 'Dockerfile.visqol'
      - 'config.py'
      - 'phase2_mos.py'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Calculate Content Hash
        id: calc-hash
        shell: python
        run: |
          import hashlib
          import os
          files_to_hash = [
              "Dockerfile.visqol",
              "config.py",
              "phase2_mos.py"
          ]
          hasher = hashlib.sha256()
          for fname in sorted(files_to_hash):
              if os.path.exists(fname):
                  with open(fname, "rb") as f:
                      hasher.update(fname.encode())
                      hasher.update(f.read())
          content_hash = hasher.hexdigest()[:12]
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"hash={content_hash}\n")

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.visqol
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/nschimme/faac-benchmark-visqol:latest
            ghcr.io/nschimme/faac-benchmark-visqol:${{ github.sha }}
            ghcr.io/nschimme/faac-benchmark-visqol:${{ steps.calc-hash.outputs.hash }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

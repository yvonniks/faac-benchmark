name: 'FAAC Benchmark Suite'
description: 'Runs encoding benchmarks and computes MOS scores using ViSQOL.'
inputs:
  faac-bin:
    description: 'Path to the faac binary'
    required: true
  libfaac-so:
    description: 'Path to the libfaac.so library'
    required: true
  run-name:
    description: 'Identifier for this benchmark run'
    required: true
  output-json:
    description: 'Path where the result JSON should be saved'
    required: true
  coverage:
    description: 'Percentage of dataset to cover (1-100)'
    required: false
    default: '100'
  skip-mos:
    description: 'Skip perceptual quality (MOS) computation'
    required: false
    default: 'false'
  visqol-image:
    description: 'Docker image for ViSQOL. Defaults to ghcr.io/nschimme/faac-benchmark-visqol with a tag matching the current commit/hash.'
    required: false
    default: ''
  sha:
    description: 'Commit SHA to associate with these results. Defaults to github.sha.'
    required: false
    default: '${{ github.sha }}'
  scenarios:
    description: 'Comma-separated list of scenarios to run'
    required: false
  include-tests:
    description: 'Comma-separated list of test filename globs to include'
    required: false
  exclude-tests:
    description: 'Comma-separated list of test filename globs to exclude'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      shell: bash
      run: |
        pip install -r ${{ github.action_path }}/requirements.txt
        pip install "visqol-python[accel]"

    - name: Restore Datasets
      id: cache-datasets
      uses: actions/cache/restore@v5
      with:
        path: ${{ github.action_path }}/data/external
        key: ${{ runner.os }}-datasets-${{ hashFiles(format('{0}/setup_datasets.py', github.action_path)) }}

    - name: Setup Datasets
      if: steps.cache-datasets.outputs.cache-hit != 'true'
      shell: bash
      run: |
        python3 ${{ github.action_path }}/setup_datasets.py

    - name: Save Datasets
      if: steps.cache-datasets.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: ${{ github.action_path }}/data/external
        key: ${{ runner.os }}-datasets-${{ hashFiles(format('{0}/setup_datasets.py', github.action_path)) }}

    - name: Run Benchmark
      shell: bash
      env:
        PYTHONPATH: ${{ github.action_path }}
      run: |
        EXTRA_ARGS=""
        if [ "${{ inputs.skip-mos }}" == "true" ]; then
          EXTRA_ARGS="$EXTRA_ARGS --skip-mos"
        fi

        if [ -n "${{ inputs.visqol-image }}" ]; then
          EXTRA_ARGS="$EXTRA_ARGS --visqol-image ${{ inputs.visqol-image }}"
        fi

        if [ -n "${{ inputs.sha }}" ]; then
          EXTRA_ARGS="$EXTRA_ARGS --sha ${{ inputs.sha }}"
        fi

        if [ -n "${{ inputs.scenarios }}" ]; then
          EXTRA_ARGS="$EXTRA_ARGS --scenarios ${{ inputs.scenarios }}"
        fi

        if [ -n "${{ inputs.include-tests }}" ]; then
          EXTRA_ARGS="$EXTRA_ARGS --include-tests ${{ inputs.include-tests }}"
        fi

        if [ -n "${{ inputs.exclude-tests }}" ]; then
          EXTRA_ARGS="$EXTRA_ARGS --exclude-tests ${{ inputs.exclude-tests }}"
        fi
        
        python3 ${{ github.action_path }}/run_benchmark.py \
          "${{ inputs.faac-bin }}" \
          "${{ inputs.libfaac-so }}" \
          "${{ inputs.run-name }}" \
          "${{ inputs.output-json }}" \
          --coverage "${{ inputs.coverage }}" \
          $EXTRA_ARGS
